  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"1b603046-131d-498d-9dfa-dc5c95ce2bc8\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"3e30e5c3-b261-4743-a28c-717072b90bbc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"fea4a5b0-d049-476c-9f6d-335808952a78\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =================================================================\n   SAPIEN — site styles\n   ================================================================= */\n\n:root {\n  --blue: #00b8ff;\n  --blue-deep: #0099d6;\n  --blue-soft: #e6f7ff;\n  --blue-faint: #f3fbff;\n  --ink: #0a0e1a;\n  --ink-2: #1b2230;\n  --gray-1: #475569;\n  --gray-2: #64748b;\n  --gray-3: #94a3b8;\n  --line: #e6ecf2;\n  --line-soft: #f0f4f8;\n  --bg: #ffffff;\n  --bg-2: #f7fafd;\n  --radius: 14px;\n  --radius-sm: 9px;\n  --radius-lg: 22px;\n  --shadow-sm: 0 1px 2px rgba(10,14,26,0.04), 0 1px 0 rgba(10,14,26,0.02);\n  --shadow-md: 0 8px 24px -8px rgba(10,14,26,0.08), 0 2px 6px rgba(10,14,26,0.04);\n  --shadow-lg: 0 30px 60px -20px rgba(10,14,26,0.18), 0 12px 24px -12px rgba(10,14,26,0.1);\n  --shadow-blue: 0 30px 70px -20px rgba(0, 184, 255, 0.35), 0 8px 22px -8px rgba(0, 184, 255, 0.18);\n  --mono: \"Geist Mono\", ui-monospace, \"SFMono-Regular\", Menlo, monospace;\n  --sans: \"Geist\", -apple-system, system-ui, sans-serif;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-size: 16px;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; }\ncode, pre { font-family: var(--mono); }\n\n.container {\n  max-width: 1200px;\n  margin: 0 auto;\n  padding: 0 32px;\n}\n\n/* ===== Buttons & chips ===== */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 12px 18px;\n  border-radius: 10px;\n  font-weight: 500;\n  font-size: 15px;\n  letter-spacing: -0.01em;\n  border: 1px solid transparent;\n  transition: all 0.15s ease;\n  white-space: nowrap;\n}\n.btn-primary {\n  background: var(--ink);\n  color: #fff;\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);\n}\n.btn-primary:hover {\n  background: #1b2230;\n  transform: translateY(-1px);\n  box-shadow: 0 8px 18px -6px rgba(10,14,26,0.25), inset 0 1px 0 rgba(255,255,255,0.08);\n}\n.btn-ghost {\n  background: #fff;\n  color: var(--ink);\n  border-color: var(--line);\n}\n.btn-ghost:hover {\n  border-color: #cbd5e1;\n  background: var(--bg-2);\n}\n.btn-sm { padding: 8px 14px; font-size: 14px; }\n.link-quiet {\n  color: var(--gray-1);\n  font-size: 14px;\n  font-weight: 500;\n}\n.link-quiet:hover { color: var(--ink); }\n\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 6px 12px 6px 10px;\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  background: #fff;\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: 0.02em;\n  color: var(--gray-1);\n  text-transform: none;\n  box-shadow: var(--shadow-sm);\n}\n.eyebrow .dot {\n  width: 6px; height: 6px;\n  border-radius: 999px;\n  background: var(--blue);\n  box-shadow: 0 0 0 3px rgba(0,184,255,0.15);\n}\n\n/* ===== Nav ===== */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  background: rgba(255,255,255,0.82);\n  backdrop-filter: saturate(140%) blur(14px);\n  -webkit-backdrop-filter: saturate(140%) blur(14px);\n  border-bottom: 1px solid var(--line-soft);\n}\n.nav-inner {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 24px;\n  height: 64px;\n}\n.logo {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  font-size: 18px;\n}\n.logo img { width: 28px; height: 28px; }\n.nav-links {\n  display: flex;\n  gap: 28px;\n}\n.nav-links a {\n  font-size: 14px;\n  font-weight: 500;\n  color: var(--gray-1);\n  transition: color 0.15s;\n}\n.nav-links a:hover { color: var(--ink); }\n.nav-actions { display: flex; gap: 12px; align-items: center; }\n\n/* ===== HERO ===== */\n.hero {\n  position: relative;\n  padding: 96px 0 80px;\n  overflow: hidden;\n  background:\n    radial-gradient(900px 500px at 80% -10%, rgba(0,184,255,0.10), transparent 60%),\n    radial-gradient(700px 400px at 10% 0%, rgba(0,184,255,0.06), transparent 60%);\n}\n.hero::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(to right, rgba(10,14,26,0.04) 1px, transparent 1px),\n    linear-gradient(to bottom, rgba(10,14,26,0.04) 1px, transparent 1px);\n  background-size: 56px 56px;\n  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 35%, transparent 75%);\n  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 35%, transparent 75%);\n  pointer-events: none;\n}\n.hero > .container { position: relative; }\n\n.hero-title {\n  font-size: clamp(48px, 7vw, 96px);\n  line-height: 1.0;\n  letter-spacing: -0.035em;\n  font-weight: 600;\n  margin: 24px 0 24px;\n  max-width: 14ch;\n}\n.hero-title .accent {\n  background: linear-gradient(180deg, var(--blue) 0%, var(--blue-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.hero-sub {\n  font-size: 19px;\n  line-height: 1.55;\n  color: var(--gray-1);\n  max-width: 60ch;\n  margin: 0 0 32px;\n}\n.hero-cta { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }\n.hero-trust {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  font-family: var(--mono);\n  font-size: 12px;\n  color: var(--gray-2);\n}\n.hero-trust > span:first-child { letter-spacing: 0.04em; text-transform: uppercase; }\n.trust-marks {\n  display: flex;\n  gap: 10px;\n  flex-wrap: wrap;\n  color: var(--gray-1);\n}\n.trust-marks span { font-weight: 500; }\n\n/* Split hero panes */\n.hero-split {\n  display: grid;\n  grid-template-columns: 1fr 1.05fr;\n  gap: 28px;\n  margin-top: 64px;\n  position: relative;\n}\n.hero-pane {\n  position: relative;\n  margin: 0;\n  padding: 0;\n}\n.pane-label {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--gray-2);\n  margin-bottom: 12px;\n}\n.pane-label::before {\n  content: \"\";\n  width: 18px; height: 1px;\n  background: var(--gray-3);\n}\n\n/* Identity card */\n.id-card {\n  position: relative;\n  background: #fff;\n  border: 1px solid var(--line);\n  border-radius: var(--radius-lg);\n  padding: 22px;\n  box-shadow: var(--shadow-lg);\n  overflow: hidden;\n}\n.id-card::before {\n  content: \"\";\n  position: absolute;\n  inset: -1px;\n  border-radius: var(--radius-lg);\n  background: linear-gradient(180deg, rgba(0,184,255,0.3), transparent 40%);\n  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);\n  -webkit-mask-composite: xor;\n          mask-composite: exclude;\n  padding: 1px;\n  pointer-events: none;\n}\n.id-card-head {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  margin-bottom: 18px;\n}\n.id-brand {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-weight: 600;\n  font-size: 14px;\n}\n.id-brand img { width: 22px; height: 22px; }\n.id-status {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--mono);\n  font-size: 11px;\n  background: var(--blue-soft);\n  color: var(--blue-deep);\n  padding: 4px 10px;\n  border-radius: 999px;\n  font-weight: 500;\n}\n.verify-dot {\n  width: 6px; height: 6px;\n  border-radius: 999px;\n  background: var(--blue);\n  box-shadow: 0 0 0 3px rgba(0,184,255,0.15);\n}\n.id-card-body {\n  display: flex;\n  gap: 18px;\n  align-items: center;\n  padding: 8px 0 18px;\n}\n.id-photo {\n  flex: 0 0 auto;\n  border-radius: 12px;\n  overflow: hidden;\n  border: 1px solid var(--line);\n}\n.id-fields { flex: 1; min-width: 0; }\n.id-name {\n  font-size: 22px;\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  margin-bottom: 10px;\n}\n.id-meta {\n  display: grid;\n  gap: 4px;\n}\n.id-meta > div {\n  display: grid;\n  grid-template-columns: 78px 1fr;\n  font-size: 12px;\n  color: var(--ink);\n  align-items: center;\n}\n.id-meta span {\n  color: var(--gray-2);\n  font-family: var(--mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n}\n.id-meta strong { font-weight: 500; }\n.id-card-foot {\n  border-top: 1px dashed var(--line);\n  padding-top: 14px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  gap: 14px;\n}\n.share-pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 12px;\n  color: var(--gray-1);\n}\n.share-pill strong { color: var(--ink); font-weight: 600; }\n.share-dot {\n  width: 6px; height: 6px;\n  background: var(--blue);\n  border-radius: 999px;\n  animation: pulse 2s infinite;\n}\n@keyframes pulse {\n  0%, 100% { box-shadow: 0 0 0 0 rgba(0,184,255,0.5); }\n  50% { box-shadow: 0 0 0 6px rgba(0,184,255,0); }\n}\n.share-actions { display: flex; gap: 6px; }\n.chip {\n  font-size: 12px;\n  padding: 6px 12px;\n  border-radius: 8px;\n  background: #fff;\n  border: 1px solid var(--line);\n  color: var(--ink);\n  font-weight: 500;\n}\n.chip:hover { border-color: var(--gray-3); }\n.chip-solid {\n  background: var(--ink);\n  color: #fff;\n  border-color: var(--ink);\n}\n.chip-solid:hover { background: var(--ink-2); }\n\n.scan-ring {\n  position: absolute;\n  top: -40px;\n  right: -50px;\n  width: 220px;\n  height: 220px;\n  pointer-events: none;\n  opacity: 0.6;\n}\n.scan-ring svg { width: 100%; height: 100%; animation: spin 60s linear infinite; }\n@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }\n\n/* Terminal */\n.terminal {\n  background: #0a0e1a;\n  border-radius: var(--radius);\n  overflow: hidden;\n  box-shadow: var(--shadow-lg);\n  border: 1px solid #0f172a;\n}\n.term-head {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 12px 14px;\n  background: #0f1525;\n  border-bottom: 1px solid #1a2238;\n}\n.term-dots { display: flex; gap: 6px; }\n.term-dots span {\n  width: 11px; height: 11px;\n  border-radius: 999px;\n  background: #2a3349;\n}\n.term-tabs { display: flex; gap: 4px; }\n.tab {\n  font-family: var(--mono);\n  font-size: 11px;\n  color: #6b7693;\n  padding: 4px 10px;\n  border-radius: 6px;\n}\n.tab.active {\n  background: #1a2238;\n  color: #cad3e8;\n}\n.term-body {\n  font-family: var(--mono);\n  font-size: 13px;\n  line-height: 1.65;\n  color: #d6def0;\n  padding: 18px 20px;\n  margin: 0;\n  white-space: pre;\n  overflow-x: auto;\n}\n.c-key  { color: #ff7ab2; }\n.c-fn   { color: #7ad7ff; }\n.c-str  { color: #b8e986; }\n.c-var  { color: #f1f5ff; }\n.c-com  { color: #5d6a8a; font-style: italic; }\n.c-num  { color: #ffb86c; }\n\n.term-foot {\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--mono);\n  font-size: 11px;\n  padding: 10px 14px;\n  border-top: 1px solid #1a2238;\n  color: #6b7693;\n  background: #0c1120;\n}\n.term-status { display: inline-flex; align-items: center; gap: 8px; color: #b8e986; }\n.ok-dot { width: 6px; height: 6px; background: #b8e986; border-radius: 999px; }\n\n.response-card {\n  position: absolute;\n  right: -16px;\n  bottom: -28px;\n  width: 240px;\n  background: #fff;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  padding: 12px 14px;\n  box-shadow: var(--shadow-md);\n  font-family: var(--mono);\n  font-size: 11px;\n}\n.rc-row {\n  display: flex;\n  justify-content: space-between;\n  padding: 6px 0;\n  border-bottom: 1px dashed var(--line);\n}\n.rc-row:last-child { border-bottom: none; }\n.rc-row span { color: var(--gray-2); }\n.rc-row code { color: var(--ink); }\n\n/* ===== Section heads ===== */\nsection { position: relative; }\n.section-head {\n  max-width: 700px;\n  margin: 0 auto 56px;\n  text-align: center;\n}\n.section-head h2 {\n  font-size: clamp(34px, 4.5vw, 56px);\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n  font-weight: 600;\n  margin: 16px 0 14px;\n}\n.section-head .lede {\n  font-size: 18px;\n  color: var(--gray-1);\n  margin: 0;\n}\n.section-head-row {\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  text-align: left;\n  max-width: none;\n  align-items: end;\n  gap: 48px;\n}\n\n/* ===== FEATURES ===== */\n.features {\n  padding: 120px 0;\n  border-top: 1px solid var(--line-soft);\n}\n.feature-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 1px;\n  background: var(--line-soft);\n  border: 1px solid var(--line-soft);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n}\n.feat {\n  position: relative;\n  background: #fff;\n  padding: 36px 32px;\n  display: flex;\n  flex-direction: column;\n  min-height: 280px;\n  transition: background 0.25s ease;\n  cursor: default;\n}\n.feat:hover, .feat:focus-visible {\n  background: var(--blue-faint);\n  outline: none;\n}\n.feat-icon {\n  width: 40px; height: 40px;\n  border-radius: 10px;\n  background: var(--blue-soft);\n  color: var(--blue-deep);\n  display: grid;\n  place-items: center;\n  margin-bottom: 24px;\n  transition: all 0.25s ease;\n}\n.feat-icon svg { width: 22px; height: 22px; }\n.feat:hover .feat-icon, .feat:focus-visible .feat-icon {\n  background: var(--blue);\n  color: #fff;\n  transform: scale(1.06);\n}\n.feat h3 {\n  font-size: 19px;\n  font-weight: 600;\n  letter-spacing: -0.015em;\n  margin: 0 0 8px;\n}\n.feat-short {\n  color: var(--gray-1);\n  margin: 0;\n  font-size: 15px;\n  line-height: 1.5;\n  transition: opacity 0.2s, transform 0.25s;\n}\n.feat-long {\n  position: absolute;\n  left: 32px;\n  right: 32px;\n  bottom: 36px;\n  font-size: 14px;\n  line-height: 1.55;\n  color: var(--ink);\n  margin: 0;\n  opacity: 0;\n  transform: translateY(8px);\n  transition: opacity 0.2s 0s, transform 0.25s;\n  pointer-events: none;\n}\n.feat-long code {\n  font-size: 12px;\n  background: #fff;\n  border: 1px solid var(--line);\n  padding: 1px 6px;\n  border-radius: 5px;\n}\n.feat:hover .feat-short, .feat:focus-visible .feat-short {\n  opacity: 0;\n  transform: translateY(-8px);\n}\n.feat:hover .feat-long, .feat:focus-visible .feat-long {\n  opacity: 1;\n  transform: translateY(0);\n  transition-delay: 0.05s;\n}\n\n/* ===== HOW IT WORKS ===== */\n.how {\n  padding: 120px 0;\n  background: var(--bg-2);\n  border-top: 1px solid var(--line-soft);\n  border-bottom: 1px solid var(--line-soft);\n}\n.steps {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 24px;\n  counter-reset: step;\n}\n.step {\n  background: #fff;\n  border: 1px solid var(--line);\n  border-radius: var(--radius-lg);\n  padding: 32px;\n  display: flex;\n  flex-direction: column;\n  gap: 18px;\n  position: relative;\n}\n.step-num {\n  font-family: var(--mono);\n  font-size: 13px;\n  letter-spacing: 0.05em;\n  color: var(--blue);\n  font-weight: 500;\n}\n.step-body h3 {\n  font-size: 26px;\n  letter-spacing: -0.025em;\n  font-weight: 600;\n  margin: 0 0 10px;\n}\n.step-body p {\n  margin: 0 0 20px;\n  color: var(--gray-1);\n  font-size: 15px;\n  line-height: 1.55;\n}\n.step-art {\n  flex: 1;\n  border-top: 1px dashed var(--line);\n  padding-top: 22px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 160px;\n  position: relative;\n  overflow: hidden;\n}\n/* doc capture */\n.doc-frame {\n  position: relative;\n  width: 200px;\n  height: 130px;\n  background: linear-gradient(135deg, #f3fbff, #e6f7ff);\n  border-radius: 10px;\n  border: 1px solid var(--line);\n  padding: 14px;\n  display: flex;\n  gap: 12px;\n}\n.doc-corner {\n  position: absolute;\n  width: 14px;\n  height: 14px;\n  border: 2px solid var(--blue);\n}\n.doc-corner.tl { top: -3px; left: -3px; border-right: none; border-bottom: none; }\n.doc-corner.tr { top: -3px; right: -3px; border-left: none; border-bottom: none; }\n.doc-corner.bl { bottom: -3px; left: -3px; border-right: none; border-top: none; }\n.doc-corner.br { bottom: -3px; right: -3px; border-left: none; border-top: none; }\n.doc-photo {\n  width: 56px;\n  height: 70px;\n  background: linear-gradient(160deg, #cbe9f7, #8ec8e2);\n  border-radius: 5px;\n  flex: 0 0 auto;\n}\n.doc-lines { flex: 1; display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }\n.doc-lines span {\n  height: 6px;\n  background: rgba(10,14,26,0.12);\n  border-radius: 3px;\n}\n.doc-lines span:nth-child(2) { width: 80%; }\n.doc-lines span:nth-child(3) { width: 60%; }\n.doc-scan {\n  position: absolute;\n  left: 6%;\n  right: 6%;\n  top: 50%;\n  height: 2px;\n  background: linear-gradient(90deg, transparent, var(--blue), transparent);\n  box-shadow: 0 0 14px var(--blue);\n  animation: scan 2.6s ease-in-out infinite;\n}\n@keyframes scan {\n  0%, 100% { transform: translateY(-50px); opacity: 0; }\n  20% { opacity: 1; }\n  80% { opacity: 1; }\n  50% { transform: translateY(50px); }\n}\n/* verify checks */\n.check-list { display: flex; flex-direction: column; gap: 10px; width: 100 d: rgba(255,122,122,0.15); color: #aa3a3a; }\n\n/* ===== USER FLOW MOCKUP ===== */\n.wl-flow {\n  padding: 120px 0;\n  background: var(--bg-2);\n  border-top: 1px solid var(--line-soft);\n  border-bottom: 1px solid var(--line-soft);\n}\n.wl-flow-row {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 24px;\n}\n.wl-screen { display: flex; flex-direction: column; gap: 14px; }\n.screen-head {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--mono);\n  font-size: 11px;\n  letter-spacing: 0.04em;\n  color: var(--ink);\n}\n.screen-head .dot {\n  width: 8px; height: 8px;\n  border-radius: 999px;\n}\n.screen-head .dot.blue { background: var(--blue); }\n.screen-head .dot.green { background: #1f8a5b; }\n\n.screen-frame {\n  background: #fff;\n  border: 1px solid var(--line);\n  border-radius: 16px;\n  padding: 22px;\n  box-shadow: var(--shadow-md);\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  min-height: 440px;\n}\n.sc-host {\n  font-family: var(--mono);\n  font-size: 11px;\n  color: var(--gray-2);\n  padding-bottom: 14px;\n  border-bottom: 1px dashed var(--line);\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n}\n.sc-host img { width: 14px; height: 14px; }\n.screen-frame h5 {\n  font-size: 20px;\n  letter-spacing: -0.02em;\n  font-weight: 600;\n  margin: 0;\n}\n.sc-sub { font-size: 13px; color: var(--gray-1); margin: 0; line-height: 1.5; }\n.sc-sapien-btn {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 16px;\n  background: var(--ink);\n  color: #fff;\n  border-radius: 11px;\n  font-weight: 500;\n  font-size: 14px;\n  cursor: pointer;\n  box-shadow: 0 4px 12px -4px rgba(0,184,255,0.4);\n  position: relative;\n}\n.sc-sapien-btn img { width: 22px; height: 22px; filter: brightness(2); }\n.sc-sapien-btn .arrow { margin-left: auto; color: var(--blue); }\n.sc-or {\n  text-align: center;\n  font-family: var(--mono);\n  font-size: 11px;\n  color: var(--gray-3);\n  position: relative;\n}\n.sc-or::before, .sc-or::after {\n  content: \"\";\n  position: absolute;\n  top: 50%;\n  width: 30%;\n  height: 1px;\n  background: var(--line);\n}\n.sc-or::before { left: 0; }\n.sc-or::after { right: 0; }\n.sc-input {\n  padding: 10px 14px;\n  border: 1px solid var(--line);\n  border-radius: 9px;\n  font-size: 13px;\n  color: var(--ink);\n}\n.sc-input.ghost { color: var(--gray-3); }\n.sc-cta-ghost {\n  padding: 11px 16px;\n  border: 1px solid var(--line);\n  border-radius: 10px;\n  text-align: center;\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--gray-1);\n  background: var(--bg-2);\n}\n\n/* Consent screen */\n.sc-consent-head {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  flex-wrap: wrap;\n}\n.sc-avatar {\n  width: 34px; height: 34px;\n  border-radius: 9px;\n  background: var(--blue);\n  color: #fff;\n  display: grid;\n  place-items: center;\n  font-weight: 600;\n  font-size: 14px;\n  flex: 0 0 auto;\n}\n.sc-consent-head strong { font-size: 15px; font-weight: 600; }\n.sc-consent-head small {\n  width: 100%;\n  font-size: 12px;\n  color: var(--gray-1);\n  margin-top: -2px;\n}\n.sc-consent-list {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.sc-consent-list li {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-size: 13px;\n  padding: 9px 12px;\n  border: 1px solid var(--line);\n  border-radius: 9px;\n  color: var(--ink);\n}\n.sc-consent-list .ck.dim {\n  background: #f1f5f9;\n  opacity: 0.6;\n}\n.sc-consent-list .ck.dim::after { display: none; }\n.sc-consent-list small {\n  margin-left: auto;\n  font-family: var(--mono);\n  font-size: 10px;\n  color: var(--gray-3);\n}\n.sc-fine {\n  font-size: 11px;\n  color: var(--gray-2);\n  margin: 0;\n  text-align: center;\n  line-height: 1.5;\n}\n.sc-actions {\n  display: grid;\n  grid-template-columns: 1fr 1.2fr;\n  gap: 8px;\n  margin-top: auto;\n}\n.sc-btn {\n  padding: 11px 14px;\n  border-radius: 10px;\n  text-   font-weight: 600;\n  letter-spacing: -0.02em;\n  margin: 0;\n}\n.perk p { font-size: 14px; color: var(--gray-1); margin: 0; line-height: 1.55; }\n.perk p strong { color: var(--ink); font-weight: 600; }\n\n/* ===== FAQ ===== */\n.wl-faq {\n  padding: 120px 0;\n  background: var(--bg-2);\n  border-top: 1px solid var(--line-soft);\n}\n.wl-faq-inner {\n  display: grid;\n  grid-template-columns: 380px 1fr;\n  gap: 64px;\n  align-items: flex-start;\n}\n.wl-faq-side h2 {\n  font-size: clamp(30px, 3.5vw, 40px);\n  letter-spacing: -0.03em;\n  font-weight: 600;\n  line-height: 1.05;\n  margin: 16px 0 14px;\n}\n.wl-faq-side .lede { font-size: 16px; color: var(--gray-1); margin: 0; }\n.wl-faq-side a { color: var(--blue-deep); text-decoration: underline; text-underline-offset: 3px; }\n\n.wl-faq-list { display: flex; flex-direction: column; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }\n.wl-faq-list details {\n  background: #fff;\n  padding: 18px 22px;\n  transition: background 0.15s;\n}\n.wl-faq-list details:hover { background: #fcfeff; }\n.wl-faq-list details[open] { background: var(--blue-faint); }\n.wl-faq-list summary {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-size: 15px;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n  cursor: pointer;\n  list-style: none;\n  color: var(--ink);\n}\n.wl-faq-list summary::-webkit-details-marker { display: none; }\n.wl-faq-list summary i {\n  width: 22px; height: 22px;\n  border-radius: 999px;\n  border: 1px solid var(--line);\n  background: #fff;\n  position: relative;\n  flex: 0 0 auto;\n  margin-left: 16px;\n  transition: transform 0.2s;\n}\n.wl-faq-list summary i::before,\n.wl-faq-list summary i::after {\n  content: \"\";\n  position: absolute;\n  background: var(--ink);\n  left: 50%;\n  top: 50%;\n}\n.wl-faq-list summary i::before { width: 10px; height: 1.5px; transform: translate(-50%, -50%); }\n.wl-faq-list summary i::after  { width: 1.5px; height: 10px; transform: translate(-50%, -50%); }\n.wl-faq-list details[open] summary i::after { display: none; }\n.wl-faq-list details p {\n  margin: 14px 0 0;\n  font-size: 14px;\n  color: var(--gray-1);\n  line-height: 1.6;\n  max-width: 70ch;\n}\n.wl-faq-list details p strong { color: var(--ink); font-weight: 600; }\n\n/* ===== FINAL CTA ===== */\n.wl-final {\n  padding: 120px 0;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n.wl-final::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background:\n    radial-gradient(700px 350px at 50% 0%, rgba(0,184,255,0.10), transparent 60%);\n  pointer-events: none;\n}\n.wl-final-inner { position: relative; }\n.wl-final h2 {\n  font-size: clamp(34px, 4.5vw, 56px);\n  letter-spacing: -0.03em;\n  font-weight: 600;\n  line-height: 1.05;\n  margin: 0 0 14px;\n}\n.wl-final p { font-size: 17px; color: var(--gray-1); margin: 0 0 28px; }\n\n/* ===== RESPONSIVE ===== */\n@media (max-width: 1100px) {\n  .wl-hero-grid { grid-template-columns: 1fr; gap: 40px; }\n  .wl-form-wrap { position: static; max-width: 560px; }\n  .wl-mock-grid { grid-template-columns: 1fr; gap: 40px; }\n  .wl-flow-row { grid-template-columns: 1fr; }\n  .wl-perks-grid { grid-template-columns: repeat(2, 1fr); }\n  .wl-faq-inner { grid-template-columns: 1fr; gap: 32px; }\n  .browser-body { grid-template-columns: 1fr; }\n  .dash-side { display: none; }\n}\n@media (max-width: 640px) {\n  .wl-hero { padding: 48px 0 60px; }\n  .wl-field-row.two { grid-template-columns: 1fr; }\n  .wl-checks { grid-template-columns: 1fr; }\n  .wl-perks-grid { grid-template-columns: 1fr; }\n  .dash-stats { grid-template-columns: repeat(2, 1fr); }\n  .dt-head, .dt-row { grid-template-columns: 1.4fr 1fr 0.8fr; }\n  .dt-head > span:nth-child(n+4),\n  .dt-row > span:nth-child(n+4) { display: none; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body class=\"waitlist-page\">\n\n<!-- ============ NAV ============ -->\n<header class=\"nav\" dat who already have a Sapien identity.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ BENEFITS / WHY JOIN ============ -->\n<section class=\"wl-perks\">\n  <div class=\"container\">\n    <header class=\"section-head\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan> Founding partner perks<\u002Fdiv>\n      <h2>Get more than early access.<\u002Fh2>\n    <\u002Fheader>\n    <div class=\"wl-perks-grid\">\n      <div class=\"perk\">\n        <div class=\"perk-num\">01<\u002Fdiv>\n        <h4>Founding-partner pricing<\u002Fh4>\n        <p>Everyone who joins us in early access gets <strong>founding-partner rates<\u002Fstrong> — locked in well below what we plan to charge later.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"perk\">\n        <div class=\"perk-num\">02<\u002Fdiv>\n        <h4>Hands-on integration support<\u002Fh4>\n        <p>Direct line to the engineers building Sapien. We'll pair with your team to get you live and won't disappear after launch.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"perk\">\n        <div class=\"perk-num\">03<\u002Fdiv>\n        <h4>Shape the roadmap<\u002Fh4>\n        <p>Regular product reviews with the core team. The features you need get prioritised before they're public.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"perk\">\n        <div class=\"perk-num\">04<\u002Fdiv>\n        <h4>Cross-platform user pool<\u002Fh4>\n        <p>As Sapien grows, your new users arrive already verified somewhere else on the network — they sign up with one tap.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FAQ ============ -->\n<section class=\"wl-faq\" id=\"faq\">\n  <div class=\"container wl-faq-inner\">\n    <div class=\"wl-faq-side\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan> FAQ<\u002Fdiv>\n      <h2>Questions before you sign up.<\u002Fh2>\n      <p class=\"lede\">Anything else? Email <a href=\"mailto:hello@sapienauth.cloud\">hello@sapienauth.cloud<\u002Fa> — a human replies, usually the same day.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"wl-faq-list\">\n      <details open=\"\">\n        <summary>Is Sapien live yet?<i><\u002Fi><\u002Fsummary>\n        <p>Not publicly. We're in active development and rolling out early access in waves. Joining the waitlist puts you in the queue — we'll reach out personally when there's a slot that fits your use case.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>What will it cost?<i><\u002Fi><\u002Fsummary>\n        <p>Pricing isn't final yet, but everyone who joins us in early access gets <strong>founding-partner rates<\u002Fstrong> locked in well below what we plan to charge later. We'll share the full pricing sheet when we reach out.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>Do we need to rip out our existing identity vendor?<i><\u002Fi><\u002Fsummary>\n        <p>No. Sapien is designed to run alongside whatever you have today. You can route a small slice of new sign-ups through us first, then expand once you're comfortable.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>What regions and documents will be supported?<i><\u002Fi><\u002Fsummary>\n        <p>Our goal is broad coverage from day one — passports, national IDs and driver's licenses across the major regions. Tell us where your users live on the form and we'll factor it into rollout order.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>Can we white-label the flow?<i><\u002Fi><\u002Fsummary>\n        <p>Yes. A hosted flow, drop-in components, and a white-labelled SDK are all on the roadmap. Early-access partners get to pick which one fits best.<\u002Fp>\n      <\u002Fdetails>\n      <details>\n        <summary>What if my use case is unusual?<i><\u002Fi><\u002Fsummary>\n        <p>Tell us about it in the form. We're shaping Sapien around the partners who join us early, so an unusual use case is a feature, not a problem.<\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FINAL CTA ============ -->\n<section class=\"wl-final\" data-screen-label=\"Final CTA\">\n  <div class=\"container wl-final-inner\">\n    <h2>Help us build the right thing.<\u002Fh2>\n    <p>Founding-partner slots are limited. The earlier you join, the more influence you have on what we build.<\u002Fp>\n    <a href=\"#form\" class=\"btn btn-primary\">Join the waitlist <span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer class=\"footer\">\n  <div class=\"container footer-base\" style=\"border-top: none; padding-top: 32px;\">\n    <small>© 2026 Sapien Systems. All rights reserved.<\u002Fsmall>\n    <small>hello@sapienauth.cloud<\u002Fsmall>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\nasync function submitForm(e) {\n  e.preventDefault();\n  var form = e.target;\n  var btn = form.querySelector('.wl-submit');\n  var fd = new FormData(form);\n  var data = {\n    email: fd.get('email'),\n    first_name: fd.get('first_name'),\n    last_name: fd.get('last_name'),\n    company: fd.get('company'),\n    role: fd.get('role'),\n    industry: fd.get('industry'),\n    company_size: fd.get('company_size'),\n    monthly_verifications: fd.get('vol'),\n    needs: fd.getAll('needs'),\n    notes: fd.get('notes') || ''\n  };\n  btn.disabled = true;\n  btn.querySelector('span').textContent = 'Submitting…';\n  fetch('/api/waitlist', {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify(data)\n  }).then(function(res) {\n    if (!res.ok) { btn.disabled = false; btn.querySelector('span').textContent = 'Request access'; return; }\n    var confirmEl = document.querySelector('.wl-confirm');\n    form.style.display = 'none';\n    confirmEl.hidden = false;\n    confirmEl.scrollIntoView({ behavior: 'smooth', block: 'center' });\n  }).catch(function(err) {\n    console.error(err);\n    btn.disabled = false;\n    btn.querySelector('span').textContent = 'Request access';\n  });\n  return false;\n}\nfunction resetForm() {\n  var form = document.querySelector('.wl-form');\n  var confirmEl = document.querySelector('.wl-confirm');\n  form.reset();\n  form.style.display = '';\n  confirmEl.hidden = true;\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
